# Alembic Configuration File
# For FastAPI + SQLAlchemy 2.0 (async) + Supabase Postgres

[alembic]
# Path to migration scripts
script_location = %(here)s/alembic

# Template for migration filenames
file_template = %%(rev)s_%%(slug)s

# Prepend current directory to sys.path
prepend_sys_path = .

# Max length of the "slug" in migration filenames
truncate_slug_length = 40

# Output encoding for revision files
output_encoding = utf-8

# Database URL
# We load this from app/config.py instead of hardcoding it here
sqlalchemy.url =

[post_write_hooks]
# Optional: Auto-format new migration files with ruff (recommended)
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S